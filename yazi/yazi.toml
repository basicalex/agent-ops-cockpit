[mgr]
ratio = [0, 1, 0]
title_format = ""
show_hidden = true
sort_by = "natural"
sort_sensitive = false
show_symlink = true
linemode = "none"
mouse_events = ["click", "scroll"]

[preview]
image_filter = "lanczos3"
image_quality = 90

[plugin]
prepend_previewers = [
  { url = "*.mmd", run = "aoc-mermaid" },
  { url = "*.mermaid", run = "aoc-mermaid" },
]
prepend_preloaders = [
  { url = "*.mmd", run = "aoc-mermaid" },
  { url = "*.mermaid", run = "aoc-mermaid" },
]
