# AOC Yazi Theme - Command tips in status bar (like Zellij)
# Catppuccin-inspired colors to match the Zellij status bar

[mgr]
cwd = { fg = "#94E2D5" }

# Hovered file
hovered = { fg = "#1E1E2E", bg = "#89B4FA", bold = true }
preview_hovered = { underline = true }

# Regular files
file = { fg = "#CDD6F4" }
directory = { fg = "#89B4FA", bold = true }
symlink = { fg = "#94E2D5" }

# Border
border_symbol = "│"
border_style  = { fg = "#444444" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#6C7086" }

# Mode indicators with command tips
mode_normal = { fg = "#89B4FA", bg = "#1E1E2E", bold = true }
mode_select = { fg = "#F38BA8", bg = "#1E1E2E", bold = true }
mode_unset  = { fg = "#6C7086", bg = "#1E1E2E" }

[mode]
normal_main = { fg = "#1E1E2E", bg = "#89B4FA", bold = true }
normal_alt  = { fg = "#89B4FA", bg = "#313244" }
select_main = { fg = "#1E1E2E", bg = "#F38BA8", bold = true }
select_alt  = { fg = "#F38BA8", bg = "#313244" }
unset_main  = { fg = "#1E1E2E", bg = "#6C7086", bold = true }
unset_alt   = { fg = "#6C7086", bg = "#313244" }

# File type icons/colors
[filetype]
rules = [
  # Directories
  { url = "*/", fg = "#89B4FA" },
  
  # Code files
  { url = "*.rs", fg = "#FAB387" },
  { url = "*.lua", fg = "#89B4FA" },
  { url = "*.py", fg = "#F9E2AF" },
  { url = "*.js", fg = "#F9E2AF" },
  { url = "*.ts", fg = "#89B4FA" },
  { url = "*.tsx", fg = "#89B4FA" },
  { url = "*.jsx", fg = "#F9E2AF" },
  { url = "*.go", fg = "#94E2D5" },
  { url = "*.sh", fg = "#A6E3A1" },
  { url = "*.bash", fg = "#A6E3A1" },
  { url = "*.zsh", fg = "#A6E3A1" },
  
  # Config files
  { url = "*.toml", fg = "#FAB387" },
  { url = "*.yaml", fg = "#F38BA8" },
  { url = "*.yml", fg = "#F38BA8" },
  { url = "*.json", fg = "#F9E2AF" },
  { url = "*.kdl", fg = "#CBA6F7" },
  
  # Docs
  { url = "*.md", fg = "#CBA6F7" },
  { url = "*.txt", fg = "#CDD6F4" },
  
  # Media
  { url = "*.png", fg = "#F5C2E7" },
  { url = "*.jpg", fg = "#F5C2E7" },
  { url = "*.jpeg", fg = "#F5C2E7" },
  { url = "*.gif", fg = "#F5C2E7" },
  { url = "*.svg", fg = "#F5C2E7" },
  { url = "*.webp", fg = "#F5C2E7" },
]
