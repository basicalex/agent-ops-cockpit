# AOC RTK routing config (project-local, seeded by aoc-init)
# mode: off|on
mode = "on"
fail_open = true
# gain_mode: double-dash|positional
gain_mode = "double-dash"
binary = "rtk"
allowlist = [
  "git status",
  "git diff",
  "git log",
  "git show",
  "git branch",
  "git rev-parse",
  "rg",
  "fd",
  "find",
  "grep",
  "tree",
  "ls",
  "du",
  "wc",
  "cat",
  "head",
  "tail",
  "pytest",
  "cargo test",
  "cargo check",
  "cargo build",
  "cargo clippy",
  "cargo fmt",
  "cargo nextest",
  "cargo metadata",
  "cargo tree",
  "cargo doc",
  "npm test",
  "npm run",
  "pnpm test",
  "pnpm run",
  "pnpm exec",
  "bun test",
  "bun run",
  "aoc-task",
  "tm list",
  "aoc-mind-service status",
  "aoc-rtk doctor",
  "journalctl",
  "systemctl status",
]
denylist = [
  "git add",
  "git commit",
  "git checkout",
  "git switch",
  "git restore",
  "git stash",
  "git merge",
  "git rebase",
  "git push",
  "git reset --hard",
  "git clean -fd",
  "git worktree remove",
  "rm -rf",
  "sudo",
  "ssh",
  "scp",
  "cargo publish",
  "npm publish",
  "pnpm publish",
  "bun publish",
  "vercel deploy --prod",
  "docker system prune",
  "docker compose down -v",
]
# Install contract: pinned URL + pinned sha256
install_url = "https://github.com/rtk-ai/rtk/releases/download/v0.22.2/rtk-x86_64-unknown-linux-gnu.tar.gz"
install_sha256 = "e6122ede16d4bcad2954db0f6a923a29ba6f75caeabdaaa6c8fa9e1d7c826da8"
