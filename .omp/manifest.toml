[asset_meta.extensions."aoc-master.ts"]
category = "orchestration"
risk = "high"
default = false
reason = "Peer orchestration and master/full-retard state writes."

[asset_meta.extensions."aoc-dox.ts"]
category = "dox"
risk = "metadata-write"
default = true
reason = "Includes read-only aoc_dox and current metadata-writing aoc_dox_writer; split is deferred."

[asset_meta.extensions."aoc-style.ts"]
category = "style"
risk = "medium"
default = true
reason = "Persistent Ponytail/Caveman prompt hook state."

[asset_meta.extensions."aoc-profile.ts"]
category = "profile"
risk = "medium"
default = true
reason = "User-local profile state changes affect future installed OMP runtime surface."

[asset_meta.skills."ponytail-workflows"]
category = "review"
risk = "low"
default = true
reason = "Read-only Ponytail review/audit/debt workflows."
